<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信号采样交互实验室 - BME 教学工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        canvas { background-color: #ffffff; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; height: 400px; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-weight: 600; color: #1e293b; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">信号采样交互实验室</h1>
            <p class="text-slate-500 mt-2">理解过采样、临界采样与欠采样 (Aliasing)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 控制面板 -->
            <div class="lg:col-span-1 space-y-8 bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <!-- 状态指示器 -->
                <div id="status-card" class="p-4 rounded-lg text-center transition-all duration-300">
                    <div id="status-text" class="text-xl font-bold">准备就绪</div>
                    <div id="status-desc" class="text-sm mt-1 opacity-90">调节滑块观察变化</div>
                </div>

                <!-- 信号频率调节 -->
                <div>
                    <div class="slider-label">
                        <span>信号频率 (f)</span>
                        <span id="val-freq" class="text-indigo-600">1 Hz</span>
                    </div>
                    <input type="range" id="input-freq" min="1" max="20" step="0.5" value="2" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>

                <!-- 采样频率调节 -->
                <div>
                    <div class="slider-label">
                        <span>采样频率 (fs)</span>
                        <span id="val-fs" class="text-emerald-600">10 Hz</span>
                    </div>
                    <input type="range" id="input-fs" min="1" max="100" step="1" value="20" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-600">
                </div>

                <!-- 数学对比 -->
                <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-700 mb-2">奈奎斯特判定</h3>
                    <div class="flex items-center justify-between text-lg font-mono">
                        <span id="calc-fs">fs = 20</span>
                        <span id="calc-operator" class="px-2">?</span>
                        <span id="calc-2f">2f = 4</span>
                    </div>
                </div>
            </div>

            <!-- 画布显示区 -->
            <div class="lg:col-span-2 space-y-4">
                <canvas id="canvas"></canvas>
                <div class="flex justify-center gap-6 text-sm">
                    <div class="flex items-center gap-2">
                        <span class="w-4 h-0.5 bg-slate-300"></span>
                        <span class="text-slate-500">模拟信号 (原始)</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        <span class="text-slate-500">数字采样点</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-4 h-0.5 border-t-2 border-dashed border-emerald-500"></span>
                        <span class="text-slate-500">重建信号</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 知识提示页脚 -->
        <footer class="mt-12 p-6 bg-indigo-50 rounded-xl text-indigo-900 border border-indigo-100">
            <h2 class="font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" /></svg>
                采样定理小贴士
            </h2>
            <p class="mt-2 text-sm leading-relaxed">
                当 <strong>fs > 2f</strong> 时，我们称之为过采样，能够完美恢复信号。当 <strong>fs < 2f</strong> 时，高频信号会由于采样点不足“伪装”成一个低频波形，这就是混叠现象 (Aliasing)。注意观察采样点连成的虚线：在欠采样状态下，它形成的频率明显低于原始频率。
            </p>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const inputFreq = document.getElementById('input-freq');
        const inputFs = document.getElementById('input-fs');
        const valFreq = document.getElementById('val-freq');
        const valFs = document.getElementById('val-fs');
        const statusCard = document.getElementById('status-card');
        const statusText = document.getElementById('status-text');
        const statusDesc = document.getElementById('status-desc');
        const calcFs = document.getElementById('calc-fs');
        const calcOperator = document.getElementById('calc-operator');
        const calc2f = document.getElementById('calc-2f');

        let width, height;

        function resize() {
            width = canvas.clientWidth;
            height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        function draw() {
            const f = parseFloat(inputFreq.value);
            const fs = parseFloat(inputFs.value);
            
            valFreq.innerText = `${f} Hz`;
            valFs.innerText = `${fs} Hz`;

            // 更新数学公式区域
            calcFs.innerText = `fs = ${fs}`;
            calc2f.innerText = `2f = ${2 * f}`;

            // 状态判定逻辑
            if (fs > 2.5 * f) {
                statusCard.className = "p-4 rounded-lg text-center bg-emerald-100 text-emerald-800";
                statusText.innerText = "过采样 (Oversampling)";
                statusDesc.innerText = "数据非常安全，细节清晰还原";
                calcOperator.innerText = ">";
                calcOperator.className = "px-2 text-emerald-600 font-bold";
            } else if (Math.abs(fs - 2 * f) < 0.1) {
                statusCard.className = "p-4 rounded-lg text-center bg-amber-100 text-amber-800";
                statusText.innerText = "临界采样 (Critical)";
                statusDesc.innerText = "恰好满足定理，但波形可能失真";
                calcOperator.innerText = "=";
                calcOperator.className = "px-2 text-amber-600 font-bold";
            } else if (fs > 2 * f) {
                statusCard.className = "p-4 rounded-lg text-center bg-blue-100 text-blue-800";
                statusText.innerText = "满足定理 (Nyquist OK)";
                statusDesc.innerText = "能够恢复频率，但包络略显粗糙";
                calcOperator.innerText = ">";
                calcOperator.className = "px-2 text-blue-600 font-bold";
            } else {
                statusCard.className = "p-4 rounded-lg text-center bg-rose-100 text-rose-800";
                statusText.innerText = "欠采样 (Undersampling)";
                statusDesc.innerText = "发生混叠！产生了伪信号频率";
                calcOperator.innerText = "<";
                calcOperator.className = "px-2 text-rose-600 font-bold";
            }

            ctx.clearRect(0, 0, width, height);

            // 绘制坐标轴
            ctx.beginPath();
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.moveTo(0, height / 2);
            ctx.lineTo(width, height / 2);
            ctx.stroke();

            const amplitude = height * 0.35;
            const pixelsPerSecond = width; // 假设画布宽度代表 1 秒时间
            
            // 1. 绘制模拟信号 (原始波形 - 浅灰色)
            ctx.beginPath();
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            for (let x = 0; x < width; x++) {
                const t = x / width;
                const y = height / 2 + amplitude * Math.sin(2 * Math.PI * f * t);
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // 2. 采样计算
            const samples = [];
            const numSamples = Math.floor(fs);
            for (let i = 0; i <= numSamples; i++) {
                const t = i / fs;
                if (t > 1) break;
                const x = t * width;
                const y = height / 2 + amplitude * Math.sin(2 * Math.PI * f * t);
                samples.push({ x, y });
            }

            // 3. 绘制重建信号 (采样点连线 - 虚线)
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.strokeStyle = '#10b981'; // emerald-500
            ctx.lineWidth = 2;
            samples.forEach((p, idx) => {
                if (idx === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();
            ctx.setLineDash([]);

            // 4. 绘制采样点 (实心圆)
            samples.forEach(p => {
                ctx.beginPath();
                ctx.fillStyle = '#10b981';
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
                // 绘制采样线 (垂直到坐标轴)
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(16, 185, 129, 0.2)';
                ctx.moveTo(p.x, height/2);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
            });

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
